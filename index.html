<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial: Botón Hamburguesa Accesible</title>
    <link rel="stylesheet" href="src/assets/vendor/normalize.css">
    <link rel="stylesheet" href="src/assets/styles/style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">MiPortafolio</div>
        
        <button type="button" 
                class="menu-toggle" 
                id="menuBtn"
                aria-label="Abrir menú de navegación" 
                aria-expanded="false" 
                aria-controls="mainMenu">
            <span class="hamburger-box">
                <span class="hamburger-inner"></span>
            </span>
        </button>

        <nav id="mainMenu" class="nav-menu">
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Proyectos</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <script src="src/assets/utils/script.js"></script>
</body>
</html>
